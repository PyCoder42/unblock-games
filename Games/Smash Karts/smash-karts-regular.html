async function fetchAndCombineZip(binUrls) {
  var responses = await Promise.all(binUrls.map(function(url) { return fetch(url); }));
  var buffers = await Promise.all(responses.map(function(response) { return response.arrayBuffer(); }));
  var totalLength = buffers.reduce(function(accumulator, buffer) { return accumulator + buffer.byteLength; }, 0);
  var combined = new Uint8Array(totalLength);
  var offset = 0;
  buffers.forEach(function(buffer) {
    combined.set(new Uint8Array(buffer), offset);
    offset += buffer.byteLength;
  });
  return combined;
}

async function unzipFiles(binUrls) {
  var blobUrls = {};
  var bytes = await fetchAndCombineZip(binUrls);
  var zip = await JSZip.loadAsync(bytes);
  var entries = Object.entries(zip.files);
  for (var index = 0; index < entries.length; index++) {
    var filename = entries[index][0];
    var file = entries[index][1];
    if (!file.dir) {
      var mime = "application/octet-stream";
      if (filename.includes("250100c98afece1d27bb09b3a3d618ca")) mime = "application/wasm";
      else if (filename.includes("ed690d1402dd39fcf7abb15b99effdea")) mime = "application/javascript";
      else if (filename.endsWith(".js") || filename.endsWith(".mjs")) mime = "text/javascript";
      else if (filename.endsWith(".css")) mime = "text/css";
      else if (filename.endsWith(".png")) mime = "image/png";
      else if (filename.endsWith(".jpg") || filename.endsWith(".jpeg")) mime = "image/jpeg";
      else if (filename.endsWith(".wasm")) mime = "application/wasm";
      var rawBlob = await file.async("blob");
      blobUrls[filename] = URL.createObjectURL(new Blob([rawBlob], { type: mime }));
    }
  }
  return blobUrls;
}

if (typeof JSZip === "undefined") {
